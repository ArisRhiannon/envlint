name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.18", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Prove the published JavaScript artifact runs on the oldest supported Node,
  # which cannot strip TypeScript types — i.e. users never need Bun or a build step.
  dist-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: node dist/cli.js --version
