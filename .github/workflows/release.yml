name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # enables npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm install -g npm@latest # ensure provenance support
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          # Token is supplied as an environment variable, never committed.
          # Add an npm "Automation" token as the NPM_TOKEN repository secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
